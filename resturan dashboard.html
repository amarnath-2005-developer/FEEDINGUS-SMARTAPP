<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Dashboard - FEEDINGUS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSF7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="STYLE.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        .dashboard-container {
            background-color: #1a1a1a;
            padding: 80px 20px 50px;
            min-height: 100vh;
            color: white;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .dashboard-header h2 {
            font-size: 28px;
            color: #f08804;
        }
        .logout-btn {
            background-color: #f08804;
            padding: 10px 20px;
            font-size: 14px;
        }
        .dashboard-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .order-graph {
            background-color: #292929;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #f08804;
            margin-bottom: 20px;
        }
        .menu-section {
            background-color: #292929;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #f08804;
        }
        .menu-section h3 {
            font-size: 20px;
            color: #f08804;
            margin-bottom: 15px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .menu-item {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #f08804;
        }
        .menu-item p {
            font-size: 14px;
            text-transform: none;
            margin: 5px 0;
        }
        .orders-panel {
            background-color: #292929;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #f08804;
            height: fit-content;
        }
        .orders-panel h3 {
            font-size: 20px;
            color: #f08804;
            margin-bottom: 15px;
        }
        .order-item {
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            text-transform: none;
            font-size: 14px;
            border: 1px solid #f08804;
        }
        .order-item p {
            margin: 5px 0;
        }
        .order-item .btn {
            padding: 8px 16px;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div id="navbar">
            <a id="logo" href="index.html">feedingus.com</a>
            <a href="index.html#about">About</a>
            <a href="index.html#contact">Contact</a>
        </div>
    </header>
    <div class="dashboard-container">
        <div class="dashboard-header" style="max-width: 1200px; margin: 0 auto;">
            <h2 id="restaurantName">Restaurant Dashboard</h2>
            <button class="btn logout-btn" onclick="logout()">Logout</button>
        </div>
        <div class="dashboard-content">
            <div>
                <div class="order-graph">
                    <h3>Order History</h3>
                    <canvas id="orderChart"></canvas>
                </div>
                <div class="menu-section">
                    <h3>Menu Items</h3>
                    <div class="menu-grid" id="menuGrid"></div>
                </div>
            </div>
            <div class="orders-panel">
                <h3>Incoming Orders</h3>
                <div id="ordersList"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="footer-content">
            <a href="index.html#terms">Terms of Service</a>
            <a href="index.html#privacy">Privacy Policy</a>
            <a href="index.html#contact">Contact Us</a>
            <a href="index.html#help">Help</a>
        </div>
        <div class="footer-socials">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
        </div>
        <div class="footer-bottom">
            © 2025 FeedingUs.com | All rights reserved
        </div>
    </footer>
    <script>
        // Simulated data storage using localStorage
        function getRestaurantData() {
            return JSON.parse(localStorage.getItem('restaurantData')) || null;
        }

        function checkAuth() {
            const restaurantData = getRestaurantData();
            if (!restaurantData) {
                alert('Please log in to access the dashboard.');
                window.location.href = 'login.html';
            } else {
                document.getElementById('restaurantName').textContent = `${restaurantData.restaurantName} Dashboard`;
            }
        }

        function logout() {
            localStorage.removeItem('restaurantData');
            window.location.href = 'index.html';
        }

        // Chart.js for order history
        function initChart() {
            const ctx = document.getElementById('orderChart').getContext('2d');
            const ordersData = {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Orders',
                    data: [50, 70, 60, 80, 90, 100],
                    backgroundColor: 'rgba(240, 136, 4, 0.2)',
                    borderColor: '#f08804',
                    borderWidth: 2
                }]
            };
            new Chart(ctx, {
                type: 'line',
                data: ordersData,
                options: {
                    scales: {
                        y: { beginAtZero: true }
                    },
                    plugins: {
                        legend: { labels: { color: 'white' } }
                    },
                    responsive: true
                }
            });
        }

        // Random menu items
        const vegItems = [
            { name: 'Paneer Tikka', price: 10 },
            { name: 'Vegetable Biryani', price: 8 },
            { name: 'Dal Makhani', price: 7 },
            { name: 'Aloo Gobi', price: 6 },
            { name: 'Palak Paneer', price: 9 }
        ];
        const nonVegItems = [
            { name: 'Chicken Curry', price: 12 },
            { name: 'Butter Chicken', price: 14 },
            { name: 'Fish Fry', price: 11 },
            { name: 'Mutton Rogan Josh', price: 15 },
            { name: 'Chicken Tikka', price: 13 }
        ];

        function displayMenu() {
            const menuGrid = document.getElementById('menuGrid');
            const selectedVeg = vegItems.slice(0, 3);
            const selectedNonVeg = nonVegItems.slice(0, 3);
            const allItems = [...selectedVeg, ...selectedNonVeg];
            allItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'menu-item';
                itemDiv.innerHTML = `
                    <p>${item.name}</p>
                    <p>$${item.price}</p>
                    <p>${vegItems.includes(item) ? 'Veg' : 'Non-Veg'}</p>
                `;
                menuGrid.appendChild(itemDiv);
            });
        }

        // Simulated incoming orders
        const orders = [
            { id: 1, item: 'Paneer Tikka', quantity: 2, status: 'Pending' },
            { id: 2, item: 'Chicken Curry', quantity: 1, status: 'Pending' },
            { id: 3, item: 'Vegetable Biryani', quantity: 3, status: 'Pending' }
        ];

        function displayOrders() {
            const ordersList = document.getElementById('ordersList');
            orders.forEach(order => {
                const orderDiv = document.createElement('div');
                orderDiv.className = 'order-item';
                orderDiv.innerHTML = `
                    <p>Order #${order.id}</p>
                    <p>Item: ${order.item}</p>
                    <p>Quantity: ${order.quantity}</p>
                    <p>Status: ${order.status}</p>
                    <button class="btn" onclick="acceptOrder(${order.id})">Accept Order</button>
                `;
                ordersList.appendChild(orderDiv);
            });
        }

        function acceptOrder(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (order) {
                order.status = 'Accepted';
                alert(`Order #${orderId} accepted!`);
                document.getElementById('ordersList').innerHTML = '';
                displayOrders();
            }
        }

        // Initialize dashboard
        window.onload = function() {
            checkAuth();
            initChart();
            displayMenu();
            displayOrders();
        };
    </script>
</body>
</html>

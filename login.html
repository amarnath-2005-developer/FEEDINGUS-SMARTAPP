<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FEEDINGUS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSF7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="STYLE.css">
</head>
<body>
    <header>
        <div id="navbar">
            <a id="logo" href="index.html">feedingus.com</a>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </header>
    <div class="login-section">
        <div class="login-container">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="email">Email or Username</label>
                <input type="text" id="email" name="email" placeholder="Enter email or username" required>
                <label for="password">Password</label>
                <input type="password" idcompliance="password" name="password" placeholder="Enter password" required>
                <button type="submit" class="btn">Login</button>
                <a href="#" class="forgot-password">Forgotten Password?</a>
                <p>Don't have an account? <a href="index.html" class="signup-link">Sign Up</a></p>
            </form>
        </div>
    </div>
    <footer class="footer">
        <div class="footer-content">
            <a href="index.html#terms">Terms of Service</a>
            <a href="index.html#privacy">Privacy Policy</a>
            <a href="index.html#contact">Contact Us</a>
            <a href="index.html#help">Help</a>
        </div>
        <div class="footer-socials">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
        </div>
        <div class="footer-bottom">
            © 2025 FeedingUs.com | All rights reserved
        </div>
    </footer>
    <script>
        // Simulated user database in localStorage
        function initializeUsers() {
            const users = [
                {
                    email: "restaurant1@feedingus.com",
                    password: "password123",
                    restaurantName: "Sample Restaurant",
                    restaurantLocation: "Sample Location",
                    restaurantValidation: "12345"
                },
                {
                    email: "restaurant2@feedingus.com",
                    password: "password456",
                    restaurantName: "Tasty Bistro",
                    restaurantLocation: "Downtown",
                    restaurantValidation: "67890"
                }
            ];
            if (!localStorage.getItem('users')) {
                localStorage.setItem('users', JSON.stringify(users));
            }
        }

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Get users from localStorage
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                // Store restaurant data for dashboard
                localStorage.setItem('restaurantData', JSON.stringify({
                    email: user.email,
                    restaurantName: user.restaurantName,
                    restaurantLocation: user.restaurantLocation,
                    restaurantValidation: user.restaurantValidation
                }));
                alert('Login successful!');
                window.location.href = 'restaurant_dashboard.html';
            } else {
                alert('Invalid email or password. Please try again.');
            }
        });

        // Initialize users on page load
        window.onload = initializeUsers;
    </script>
</body>
</html>
